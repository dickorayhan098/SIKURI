                  $ref: "#/components/schemas/ProfilLulusan"
    post:
      operationId: createProfilLulusan
      tags: [profil-lulusan]
      summary: Tambah Profil Lulusan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilLulusanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilLulusan"

  /profil-lulusan/{id}:
    patch:
      operationId: updateProfilLulusan
      tags: [profil-lulusan]
      summary: Update Profil Lulusan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfilLulusanUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfilLulusan"
    delete:
      operationId: deleteProfilLulusan
      tags: [profil-lulusan]
      summary: Hapus Profil Lulusan
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── BAHAN KAJIAN ─────────────────────────────────────────────────────────────
  /bahan-kajian:
    get:
      operationId: listBahanKajian
      tags: [bahan-kajian]
      summary: Daftar Bahan Kajian
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BahanKajian"
    post:
      operationId: createBahanKajian
      tags: [bahan-kajian]
      summary: Tambah Bahan Kajian
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BahanKajianInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BahanKajian"

  /bahan-kajian/{id}:
    patch:
      operationId: updateBahanKajian
      tags: [bahan-kajian]
      summary: Update Bahan Kajian
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BahanKajianUpdate"
      responses:
