openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SIKURI SI - Sistem Informasi Kurikulum Program Studi S1 Sistem Informasi
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard & statistik
  - name: mata-kuliah
    description: Manajemen Mata Kuliah
  - name: cpl
    description: Capaian Pembelajaran Lulusan Prodi
  - name: cpmk
    description: Capaian Pembelajaran Mata Kuliah
  - name: sub-cpmk
    description: Sub Capaian Pembelajaran Mata Kuliah
  - name: pemetaan
    description: Pemetaan / Mapping matriks
  - name: rps
    description: Rencana Pembelajaran Semester
  - name: profil-lulusan
    description: Profil Lulusan
  - name: bahan-kajian
    description: Bahan Kajian
  - name: cpl-sndikti
    description: CPL SN-Dikti
  - name: users
    description: Manajemen pengguna
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Statistik utama kurikulum
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/sks-per-semester:
    get:
      operationId: getDashboardSksPerSemester
      tags: [dashboard]
      summary: Distribusi SKS per semester
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SksPerSemester"

  /dashboard/kelengkapan:
    get:
      operationId: getDashboardKelengkapan
      tags: [dashboard]
      summary: Status kelengkapan dokumen kurikulum
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KelengkapanDokumen"

  # ─── MATA KULIAH ──────────────────────────────────────────────────────────────
  /mata-kuliah:
    get:
      operationId: listMataKuliah
      tags: [mata-kuliah]
      summary: Daftar semua mata kuliah
      parameters:
        - name: semester
          in: query
          schema:
            type: ["integer", "null"]
        - name: tipe
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MataKuliah"
    post:
      operationId: createMataKuliah
      tags: [mata-kuliah]
      summary: Tambah mata kuliah baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MataKuliahInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MataKuliah"

  /mata-kuliah/{id}:
    get:
      operationId: getMataKuliah
      tags: [mata-kuliah]
      summary: Detail satu mata kuliah
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MataKuliah"
        "404":
          description: Not found
    patch:
      operationId: updateMataKuliah
      tags: [mata-kuliah]
      summary: Update mata kuliah
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MataKuliahUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MataKuliah"
    delete:
      operationId: deleteMataKuliah
      tags: [mata-kuliah]
      summary: Hapus mata kuliah
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CPL PRODI ───────────────────────────────────────────────────────────────
  /cpl:
    get:
      operationId: listCpl
      tags: [cpl]
      summary: Daftar CPL Prodi
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CplProdi"
    post:
      operationId: createCpl
      tags: [cpl]
      summary: Tambah CPL baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CplProdiInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CplProdi"

  /cpl/{id}:
    get:
      operationId: getCpl
      tags: [cpl]
      summary: Detail CPL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CplProdi"
    patch:
      operationId: updateCpl
      tags: [cpl]
      summary: Update CPL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CplProdiUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CplProdi"
    delete:
      operationId: deleteCpl
      tags: [cpl]
      summary: Hapus CPL
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── CPMK ────────────────────────────────────────────────────────────────────
  /cpmk:
    get:
      operationId: listCpmk
      tags: [cpmk]
      summary: Daftar semua CPMK
      parameters:
        - name: cpl_id
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Cpmk"
    post:
      operationId: createCpmk
      tags: [cpmk]
      summary: Tambah CPMK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CpmkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cpmk"

  /cpmk/{id}:
    patch:
      operationId: updateCpmk
      tags: [cpmk]
      summary: Update CPMK
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CpmkUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cpmk"
    delete:
      operationId: deleteCpmk
      tags: [cpmk]
      summary: Hapus CPMK
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SUB-CPMK ────────────────────────────────────────────────────────────────
  /sub-cpmk:
    get:
      operationId: listSubCpmk
      tags: [sub-cpmk]
      summary: Daftar Sub-CPMK
      parameters:
        - name: mk_id
          in: query
          schema:
            type: ["integer", "null"]
        - name: cpmk_id
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SubCpmk"
    post:
      operationId: createSubCpmk
      tags: [sub-cpmk]
      summary: Tambah Sub-CPMK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubCpmkInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubCpmk"

  /sub-cpmk/{id}:
    patch:
      operationId: updateSubCpmk
      tags: [sub-cpmk]
      summary: Update Sub-CPMK
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubCpmkUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubCpmk"
    delete:
      operationId: deleteSubCpmk
      tags: [sub-cpmk]
      summary: Hapus Sub-CPMK
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PROFIL LULUSAN ───────────────────────────────────────────────────────────
  /profil-lulusan:
    get:
      operationId: listProfilLulusan
      tags: [profil-lulusan]
      summary: Daftar Profil Lulusan
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
