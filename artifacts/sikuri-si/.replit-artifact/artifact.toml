kind = "web"
previewPath = "/"
title = "SIKURI SI"
version = "1.0.0"
id = "artifacts/sikuri-si"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21335

[services.development]
run = "pnpm --filter @workspace/sikuri-si run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sikuri-si", "run", "build" ]
publicDir = "artifacts/sikuri-si/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21335"
BASE_PATH = "/"
